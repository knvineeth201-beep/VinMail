<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinMail | Professional Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f6f8fc; }
        .vinmail-blue { color: #1A2B48; }
        .vinmail-bg-blue { background-color: #1A2B48; }
        .gmail-active { background-color: #D3E3FD; font-weight: bold; color: #041E49; border-radius: 0 50px 50px 0; }
        .logo-auth { height: 80px; width: auto; margin-bottom: 1.5rem; }
        .logo-header { height: 35px; width: auto; }
        .page { display: none; }
        .page.active { display: flex; }
        #main-page.active { display: flex; flex-direction: column; }
        #compose-modal { 
            display: none; 
            position: fixed; 
            bottom: 0; 
            right: 80px; 
            width: 500px; 
            background: white; 
            border-radius: 10px 10px 0 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border: 1px solid #ddd; 
            z-index: 100; 
        }
    </style>
</head>
<body class="overflow-hidden">

    <div id="signin-page" class="page active min-h-screen items-center justify-center bg-gray-100 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border">
            <img src="https://i.postimg.cc/4ytgDpj0/Gemini_Generated_Image_6yh6hn6yh6hn6yh6.png" class="logo-auth mx-auto">
            <h2 class="text-2xl font-bold vinmail-blue mb-6">Sign In</h2>
            <div class="space-y-4 text-left">
                <input type="text" id="login-email" placeholder="Email ID (user@vinmail.com)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex justify-between text-sm font-bold text-blue-700">
                    <button onclick="showPage('forgot-page')">Forgot password?</button>
                    <button onclick="showPage('signup-page')">Create account</button>
                </div>
                <button onclick="loginUser()" class="w-full vinmail-bg-blue text-white py-3 rounded-xl font-bold mt-4 hover:bg-slate-800 transition">Sign In</button>
            </div>
        </div>
    </div>

    <div id="signup-page" class="page min-h-screen items-center justify-center bg-gray-100 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border">
            <h2 class="text-xl font-bold text-center vinmail-blue mb-6">Create Account</h2>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="reg-name" placeholder="Full Name" class="col-span-2 p-3 border rounded-xl">
                <input type="text" id="reg-phone" placeholder="Phone Number" class="col-span-2 p-3 border rounded-xl">
                <div class="col-span-2 flex border rounded-xl overflow-hidden">
                    <input type="text" id="reg-user" placeholder="Username" class="flex-1 p-3 outline-none">
                    <span class="bg-gray-50 p-3 text-gray-400 font-bold border-l">@vinmail.com</span>
                </div>
                <input type="password" id="reg-pass" placeholder="Password" class="p-3 border rounded-xl">
                <input type="password" id="reg-confirm" placeholder="Confirm" class="p-3 border rounded-xl">
                <button onclick="registerUser()" class="col-span-2 vinmail-bg-blue text-white py-3 rounded-xl font-bold mt-2">Submit</button>
                <button onclick="showPage('signin-page')" class="col-span-2 text-sm text-center font-bold text-blue-600">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="forgot-page" class="page min-h-screen items-center justify-center bg-gray-100 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
            <h3 class="text-xl font-bold mb-4">Account Recovery</h3>
            <p class="text-sm text-gray-500 mb-6">We will show the password associated with your phone number.</p>
            <input type="text" id="forgot-email" placeholder="username@vinmail.com" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="forgotPassword()" class="w-full vinmail-bg-blue text-white py-3 rounded-xl font-bold">Find My Password</button>
            <button onclick="showPage('signin-page')" class="mt-4 text-sm text-blue-600 font-bold">Back to Login</button>
        </div>
    </div>

    <div id="main-page" class="page h-screen flex flex-col">
        <header class="h-16 flex items-center justify-between px-6 bg-white border-b">
            <div class="flex items-center gap-4 w-72">
                <i class="fas fa-bars text-gray-500 cursor-pointer"></i>
                <img src="https://i.postimg.cc/4ytgDpj0/Gemini_Generated_Image_6yh6hn6yh6hn6yh6.png" class="logo-header">
                <span class="text-xl font-bold vinmail-blue italic">VinMail</span>
            </div>
            <div class="flex-1 max-w-2xl">
                <input type="text" placeholder="Search mail" class="bg-blue-50 w-full p-2 px-4 rounded-xl outline-none">
            </div>
            <div class="flex items-center gap-4 w-72 justify-end">
                <span id="header-name" class="font-bold mr-2 text-sm">User</span>
                <button onclick="location.reload()" class="bg-gray-100 p-1 px-3 rounded text-xs hover:bg-gray-200">Logout</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-72 p-4 bg-[#f6f8fc]">
                <button onclick="toggleCompose(true)" class="flex items-center gap-4 bg-[#C2E7FF] hover:shadow-lg p-4 rounded-2xl w-fit pr-10 mb-6 ml-2 transition">
                    <i class="fas fa-pencil-alt text-xl"></i><span class="font-bold">Compose</span>
                </button>
                <div class="flex flex-col gap-1 pr-4">
                    <div class="gmail-active px-8 py-3 cursor-pointer flex items-center gap-4"><i class="fas fa-inbox w-5"></i> Inbox</div>
                    <div class="px-8 py-3 cursor-pointer flex items-center gap-4 hover:bg-gray-200 rounded-r-full"><i class="fas fa-paper-plane w-5"></i> Sent</div>
                    <div class="px-8 py-3 cursor-pointer flex items-center gap-4 hover:bg-gray-200 rounded-r-full"><i class="fas fa-trash-alt w-5"></i> Trash</div>
                </div>
            </aside>
            <main class="flex-1 bg-white rounded-tl-3xl border-l border-t p-10">
                <h1 class="text-2xl font-bold">Welcome to your Inbox</h1>
                <p class="text-gray-500 mt-2">Everything is synced and ready.</p>
            </main>
        </div>
    </div>

    <div id="compose-modal">
        <div class="vinmail-bg-blue text-white p-3 flex justify-between items-center rounded-t-lg">
            <span class="text-sm font-bold ml-2">New Message</span>
            <div class="flex gap-3 mr-2">
                <button onclick="toggleCompose(false)"><i class="fas fa-minus text-xs"></i></button>
                <button onclick="toggleCompose(false)"><i class="fas fa-times text-sm"></i></button>
            </div>
        </div>
        <div class="p-4 space-y-2">
            <input type="text" placeholder="Recipients" class="w-full border-b p-2 outline-none text-sm">
            <input type="text" placeholder="Subject" class="w-full border-b p-2 outline-none text-sm">
            <textarea class="w-full h-64 p-2 outline-none resize-none text-sm" placeholder="Write your message..."></textarea>
            <div class="flex justify-between items-center pt-2">
                <div class="flex items-center gap-4">
                    <button onclick="toggleCompose(false)" class="bg-blue-700 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-blue-800">Send</button>
                    <i class="fas fa-font text-gray-500 cursor-pointer"></i>
                    <i class="fas fa-paperclip text-gray-500 cursor-pointer"></i>
                </div>
                <i class="fas fa-trash text-gray-400 cursor-pointer hover:text-red-500"></i>
            </div>
        </div>
    </div>

    <script>
        // Change this line (around line 125)
const API_URL = "http://127.0.0.1:8000/api";

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleCompose(show) {
            document.getElementById('compose-modal').style.display = show ? 'block' : 'none';
        }

        async function registerUser() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const userPart = document.getElementById('reg-user').value;
            const password = document.getElementById('reg-pass').value;
            if(!name || !userPart || !password) return alert("Fill all fields");

            const email = `${userPart}@vinmail.com`;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, email, password })
                });
                if (res.ok) { alert("Registration Successful!"); showPage('signin-page'); }
                else { const err = await res.json(); alert(err.message); }
            } catch(e) { alert("Server error"); }
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('header-name').innerText = result.user.name;
                    showPage('main-page');
                } else { alert(result.message); }
            } catch(e) { alert("Connection failed"); }
        }

        async function forgotPassword() {
            const email = document.getElementById('forgot-email').value;
            if(!email) return alert("Enter email");
            try {
                const res = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await res.json();
                alert(result.message);
            } catch(e) { alert("Server error"); }
        }
    </script>
</body>
</html>
